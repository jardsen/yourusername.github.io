<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CHASER OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --accent: #c8f135;
      --accent2: #f13535;
      --accent3: #3580f1;
      --text: #e8e8e8;
      --muted: #555;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9998;
      opacity: 0.4;
    }

    /* ── GATE ── */
    #gate {
      position: fixed; inset: 0;
      background: var(--bg);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #gate h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.05em;
    }
    #gate h2 span { color: var(--accent); }
    #gate-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 12px 20px;
      border-radius: 2px;
      outline: none;
      width: 260px;
      letter-spacing: 0.1em;
      text-align: center;
      transition: border-color 0.2s;
    }
    #gate-input:focus { border-color: var(--accent); }
    #gate-input.error { border-color: var(--accent2); animation: shake 0.3s ease; }
    #gate-btn {
      background: var(--accent); color: #000;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 12px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 12px 32px; border-radius: 2px;
      cursor: pointer; width: 260px;
      transition: opacity 0.2s;
    }
    #gate-btn:hover { opacity: 0.85; }
    #gate-error {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--accent2);
      letter-spacing: 0.1em; height: 16px;
    }

    /* ── OS SHELL ── */
    #os {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* TOP BAR */
    #topbar {
      height: 48px;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    #topbar-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 0.08em;
    }
    #topbar-brand span { color: var(--accent); }
    #clock {
      font-family: 'DM Mono', monospace;
      font-size: 11px; color: var(--muted); letter-spacing: 0.1em;
    }

    /* APP BAR */
    #appbar {
      display: none;
      height: 48px;
      background: #0d0d0d;
      border-bottom: 1px solid var(--border);
      align-items: center;
      padding: 0 24px;
      gap: 20px;
      flex-shrink: 0;
    }
    #back-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px; letter-spacing: 0.1em;
      padding: 6px 14px; border-radius: 2px;
      cursor: pointer; text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }
    #back-btn:hover { border-color: var(--accent); color: var(--accent); }
    #app-title-bar {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 0.08em;
    }

    /* HOME */
    #home {
      flex: 1;
      overflow-y: auto;
      padding: 36px 48px;
    }

    .home-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.3em;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 6px;
      animation: fadeDown 0.5s ease both;
    }
    .home-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(48px, 7vw, 88px);
      line-height: 0.9; letter-spacing: 0.02em;
      margin-bottom: 40px;
      animation: fadeDown 0.5s ease 0.05s both;
    }
    .home-title span { color: var(--accent); }

    .category { margin-bottom: 36px; }
    .cat-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 8px;
    }

    .app-tile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      padding: 16px 8px 12px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: background 0.18s, border-color 0.18s;
      animation: fadeUp 0.4s ease both;
      user-select: none;
    }
    .app-tile:hover {
      background: #151515;
      border-color: var(--border);
    }
    .app-tile:hover .tile-icon { transform: scale(1.07); }

    .tile-icon {
      width: 68px; height: 68px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      transition: transform 0.2s ease;
      position: relative;
      flex-shrink: 0;
    }

    .tile-name {
      font-size: 11px; color: var(--text);
      text-align: center; line-height: 1.3;
    }
    .tile-status {
      font-family: 'DM Mono', monospace;
      font-size: 9px; letter-spacing: 0.06em;
      text-transform: uppercase; color: var(--muted);
    }
    .tile-status.live { color: var(--accent); }
    .tile-status.wip  { color: #f1b335; }

    .dot {
      position: absolute; top: 4px; right: 4px;
      width: 9px; height: 9px;
      border-radius: 50%; border: 2px solid #0a0a0a;
    }
    .dot.live    { background: var(--accent); }
    .dot.wip     { background: #f1b335; }
    .dot.planned { background: #333; }

    .icon-green { background: linear-gradient(135deg,#1a2e00,#2d5200); border:1px solid #3a6600; }
    .icon-blue  { background: linear-gradient(135deg,#001a3a,#002d6b); border:1px solid #003d8f; }
    .icon-red   { background: linear-gradient(135deg,#3a0000,#6b0000); border:1px solid #8f0000; }
    .icon-gold  { background: linear-gradient(135deg,#2e1f00,#5c3d00); border:1px solid #7a5200; }
    .icon-gray  { background: linear-gradient(135deg,#1a1a1a,#2a2a2a); border:1px solid #333; }

    /* IFRAME */
    #iframe-view {
      display: none;
      flex: 1;
      width: 100%;
      border: none;
    }

    /* FOOTER */
    #os-footer {
      height: 36px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
    }
    #os-footer span {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--muted); letter-spacing: 0.1em;
    }
    .footer-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%; background: var(--accent);
      margin-right: 8px;
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes shake    { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(14px)}  to{opacity:1;transform:translateY(0)} }

    .app-tile:nth-child(1){animation-delay:0.05s}
    .app-tile:nth-child(2){animation-delay:0.10s}
    .app-tile:nth-child(3){animation-delay:0.15s}
    .app-tile:nth-child(4){animation-delay:0.20s}
    .app-tile:nth-child(5){animation-delay:0.25s}
    .app-tile:nth-child(6){animation-delay:0.30s}

    @media(max-width:600px){
      #home{padding:20px}
      .app-grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr))}
      .tile-icon{width:56px;height:56px;font-size:24px}
    }
  </style>
</head>
<body>

  <!-- GATE -->
  <div id="gate">
    <h2>CHASER <span>OS</span></h2>
    <input id="gate-input" type="password" placeholder="Enter password" autofocus />
    <div id="gate-error"></div>
    <button id="gate-btn" onclick="checkPassword()">Enter</button>
  </div>

  <!-- OS -->
  <div id="os">

    <div id="topbar">
      <div id="topbar-brand">CHASER <span>OS</span></div>
      <div id="clock"></div>
    </div>

    <div id="appbar">
      <button id="back-btn" onclick="goHome()">← Home</button>
      <div id="app-title-bar"></div>
    </div>

    <div id="home">
      <div class="home-eyebrow">Chaser OS — v0.1</div>
      <div class="home-title">CHASER <span>OS</span></div>

      <!-- ACTIVE -->
      <div class="category">
        <div class="cat-label">— Active</div>
        <div class="app-grid">
          <div class="app-tile" onclick="openApp('Sports Betting', '#')">
            <div class="tile-icon icon-gold">🎲<span class="dot wip"></span></div>
            <div class="tile-name">Sports Betting</div>
            <div class="tile-status wip">In Progress</div>
          </div>
        </div>
      </div>

      <!-- TRADING -->
      <div class="category">
        <div class="cat-label">— Trading Suite</div>
        <div class="app-grid">
          <div class="app-tile" onclick="openApp('Trading Journal', '#')">
            <div class="tile-icon icon-blue">📓<span class="dot planned"></span></div>
            <div class="tile-name">Trading Journal</div>
            <div class="tile-status">Planned</div>
          </div>
          <div class="app-tile" onclick="openApp('Backtester', '#')">
            <div class="tile-icon icon-blue">📊<span class="dot planned"></span></div>
            <div class="tile-name">Backtester</div>
            <div class="tile-status">Planned</div>
          </div>
          <div class="app-tile" onclick="openApp('ORX Bot', '#')">
            <div class="tile-icon icon-blue">🤖<span class="dot planned"></span></div>
            <div class="tile-name">ORX Bot</div>
            <div class="tile-status">Planned</div>
          </div>
        </div>
      </div>

      <!-- HEALTH -->
      <div class="category">
        <div class="cat-label">— Health & Fitness</div>
        <div class="app-grid">
          <div class="app-tile" onclick="openApp('Meal Rank', '#')">
            <div class="tile-icon icon-red">🍽️<span class="dot planned"></span></div>
            <div class="tile-name">Meal Rank</div>
            <div class="tile-status">Planned</div>
          </div>
          <div class="app-tile" onclick="openApp('Gym Rank', '#')">
            <div class="tile-icon icon-red">🏋️<span class="dot planned"></span></div>
            <div class="tile-name">Gym Rank</div>
            <div class="tile-status">Planned</div>
          </div>
          <div class="app-tile" onclick="openApp('Fit Checker', '#')">
            <div class="tile-icon icon-red">⚡<span class="dot planned"></span></div>
            <div class="tile-name">Fit Checker</div>
            <div class="tile-status">Planned</div>
          </div>
        </div>
      </div>

    </div><!-- end home -->

    <iframe id="iframe-view" src="" allowfullscreen></iframe>

    <div id="os-footer">
      <span><span class="footer-dot"></span>SYSTEM ONLINE</span>
      <span>BUILD v0.1</span>
    </div>

  </div>

  <script>
    const PASS = "March2005";

    // Clock
    function tick() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
    }
    tick(); setInterval(tick, 1000);

    // Auth
    if (sessionStorage.getItem('hub_auth') === '1') unlock();

    document.getElementById('gate-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkPassword();
    });

    function checkPassword() {
      const val = document.getElementById('gate-input').value;
      if (val === PASS) {
        sessionStorage.setItem('hub_auth', '1');
        unlock();
      } else {
        const inp = document.getElementById('gate-input');
        const err = document.getElementById('gate-error');
        inp.classList.add('error');
        err.textContent = 'INCORRECT PASSWORD';
        inp.value = '';
        setTimeout(() => { inp.classList.remove('error'); err.textContent = ''; }, 1500);
      }
    }

    function unlock() {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('os').style.display = 'flex';
    }

    // App launcher
    function openApp(name, url) {
      if (!url || url === '#') {
        alert(name + ' is not live yet.');
        return;
      }
      document.getElementById('home').style.display = 'none';
      document.getElementById('topbar').style.display = 'none';
      document.getElementById('appbar').style.display = 'flex';
      document.getElementById('app-title-bar').textContent = name;
      document.getElementById('iframe-view').style.display = 'block';
      document.getElementById('iframe-view').src = url;
    }

    function goHome() {
      document.getElementById('home').style.display = 'block';
      document.getElementById('topbar').style.display = 'flex';
      document.getElementById('appbar').style.display = 'none';
      document.getElementById('iframe-view').style.display = 'none';
      document.getElementById('iframe-view').src = '';
    }
  </script>

</body>
</html>
